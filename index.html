<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ploysai Clinic - Registration</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-[#F0F4F8] min-h-screen p-4 pb-10">
    <div class="max-w-md mx-auto pt-6">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-[#1E3A8A]">PLOYSAI <span class="text-lg font-light block opacity-70">CLINIC</span></h1>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl p-6 border border-white">
            <h2 class="text-lg font-bold mb-4 text-slate-800">ลงทะเบียนผู้ป่วยใหม่</h2>
            
            <form id="clinicForm" class="space-y-4">
                <input type="hidden" id="lineUserId">
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">ชื่อ-นามสกุล</label>
                    <input type="text" id="name" required class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-blue-300">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-blue-300">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">ประวัติแพ้ยา</label>
                        <input type="text" id="allergy" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">โรคประจำตัว</label>
                        <input type="text" id="disease" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">อัปโหลดรูปใบหน้า</label>
                    <input type="file" id="photo" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 bg-[#1E3A8A] text-white rounded-xl font-bold shadow-lg active:scale-95 transition-all">
                    ส่งข้อมูลลงทะเบียน
                </button>
            </form>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = '2009414963-gFWpfD5t';
        const WEBHOOK_URL = 'https://hook.eu1.make.com/jkvqx11glva3t9mxat4rnfbf78uxqh1';

        let base64Image = "";

        // จัดการเรื่องรูปภาพ
        document.getElementById('photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => { base64Image = reader.result; };
            reader.readAsDataURL(file);
        });

        async function init() {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); }
            else {
                const profile = await liff.getProfile();
                document.getElementById('lineUserId').value = profile.userId;
                document.getElementById('name').value = profile.displayName;
            }
        }

        document.getElementById('clinicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'กำลังส่งข้อมูล...';

            const payload = {
                line_id: document.getElementById('lineUserId').value,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                allergy: document.getElementById('allergy').value,
                disease: document.getElementById('disease').value,
                photoUrl: base64Image, // ส่งเป็นข้อความยาวๆ
                submittedAt: new Date().toISOString()
            };

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    alert('บันทึกสำเร็จ!');
                    liff.closeWindow();
                } else { throw new Error(); }
            } catch (err) {
                alert('เกิดข้อผิดพลาด! ตรวจสอบว่าเปิด Make.com หรือยัง');
                btn.disabled = false;
                btn.innerText = 'ส่งข้อมูลลงทะเบียน';
            }
        });
        init();
    </script>
</body>
</html>
