<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ploysai Clinic - Registration</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-[#F0F4F8] min-h-screen p-4">
    <div class="max-w-md mx-auto pt-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-[#1E3A8A] tracking-tighter">PLOYSAI <span class="font-light tracking-widest text-lg block opacity-70">CLINIC</span></h1>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-white">
            <h2 class="text-xl font-bold mb-6 text-slate-800">ลงทะเบียนผู้ป่วยใหม่</h2>
            
            <form id="clinicForm" class="space-y-5">
                <input type="hidden" id="lineUserId">
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">ชื่อ-นามสกุล</label>
                    <input type="text" id="name" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">ประวัติแพ้ยา</label>
                    <textarea id="allergy" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none transition-all"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-5 bg-[#1E3A8A] text-white rounded-2xl font-bold shadow-lg hover:bg-blue-900 transition-all active:scale-95">
                    ส่งข้อมูลลงทะเบียน
                </button>
            </form>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = '2009414963-gFWpfD5t';
        const WEBHOOK_URL = 'https://hook.eu1.make.com/jkvqx11glva3t9mxat4rnfbf78uxqh1'; // แก้ให้ตรงกับหน้า Make

        async function init() {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById('lineUserId').value = profile.userId;
                document.getElementById('name').value = profile.displayName;
            }
        }

        document.getElementById('clinicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'กำลังส่งข้อมูล...';

            const payload = {
                line_id: document.getElementById('lineUserId').value,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                allergy: document.getElementById('allergy').value,
                submittedAt: new Date().toISOString()
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                alert('ลงทะเบียนสำเร็จแล้วค่ะ!');
                liff.closeWindow();
            } catch (err) {
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
                btn.disabled = false;
                btn.innerText = 'ส่งข้อมูลลงทะเบียน';
            }
        });

        init();
    </script>
</body>
</html>
